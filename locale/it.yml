proxytracer-proxytracer:
  admin:
    settings:
      api_key_label: Chiave API di ProxyTracer
      api_key_help: "Il tuo token API che puoi ottenere da <a>proxytracer.com</a>."
      block_all_label: Blocca tutti gli accessi al sito
      block_login_label: Blocca accessi
      block_signup_label: Blocca registrazioni
      api_timeout_label: Timeout API (millisecondi)
      cache_expiry_label: Scadenza Cache (ore)
