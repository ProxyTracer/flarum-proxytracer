      custom_block_message_label: Messaggio di blocco personalizzato
      ip_whitelist_label: Whitelist IP
      ip_whitelist_help: Inserisci gli IP o gli intervalli CIDR per ignorare il controllo del proxy, separati da ritorni a capo.
