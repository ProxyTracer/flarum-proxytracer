proxytracer-proxytracer:
  admin:
    settings:
      api_key_label: Clé API ProxyTracer
      api_key_help: "Votre jeton API que vous pouvez obtenir sur <a>proxytracer.com</a>."
      block_all_label: Bloquer tout l'accès au site
      block_login_label: Bloquer les connexions
