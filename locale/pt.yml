      trust_cloudflare_help: Necessário se o seu site estiver atrás do Cloudflare para ler com precisão os IPs dos usuários. Não ative isso em outros cenários.
      custom_block_message_label: Mensagem de bloqueio personalizada
      ip_whitelist_label: Lista Branca de IPs
      ip_whitelist_help: Insira IPs ou intervalos CIDR para ignorar a verificação de proxy, separados por quebras de linha.
