proxytracer-proxytracer:
  admin:
    settings:
      api_key_label: Chave de API ProxyTracer
      api_key_help: "Seu token de API que você pode obter em <a>proxytracer.com</a>."
      block_all_label: Bloquear todo o acesso ao site
      block_login_label: Bloquear logins
      block_signup_label: Bloquear registros
      api_timeout_label: Tempo limite da API (milissegundos)
      cache_expiry_label: Expiração do Cache (horas)
      fail_open_label: Permitir acesso em caso de erro da API
